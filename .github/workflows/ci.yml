name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web (typecheck + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -r typecheck
      - run: pnpm --filter @wireml/web test
      - run: pnpm --filter @wireml/web build

  runtime:
    name: Runtime (lint + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install runtime
        working-directory: apps/runtime
        run: |
          ~/.local/bin/uv sync --extra dev
      - name: Ruff
        working-directory: apps/runtime
        run: ~/.local/bin/uv run ruff check .
      - name: Pytest (no model downloads)
        working-directory: apps/runtime
        run: ~/.local/bin/uv run pytest -q
