name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Install project
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check wireml tests

      - name: Pytest
        run: uv run pytest -q

      - name: Smoke — wireml CLI
        run: |
          uv run wireml version
          uv run wireml device
          uv run wireml templates
          uv run wireml run demo-synthetic

  install-smoke:
    name: One-line install smoke
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - name: Install from current checkout via uv tool
        run: uv tool install .
      - name: Verify on PATH
        run: |
          ~/.local/bin/wireml version
          ~/.local/bin/wireml run demo-synthetic
