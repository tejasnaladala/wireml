<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--wire-bg);color:var(--wire-text);font-family:var(--font-sans)}
.card{padding:24px;display:flex;align-items:flex-end;gap:14px}
.col{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{background:var(--wire-accent-24);border:1px solid var(--wire-accent);border-radius:6px}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--wire-muted);text-transform:uppercase;letter-spacing:.1em}
.px{font-family:var(--font-mono);font-size:11px;color:var(--wire-text)}
</style></head><body><div class="card">
  <div class="col"><div class="box" style="width:4px;height:4px"></div><span class="lbl">1</span><span class="px">4</span></div>
  <div class="col"><div class="box" style="width:8px;height:8px"></div><span class="lbl">2</span><span class="px">8</span></div>
  <div class="col"><div class="box" style="width:12px;height:12px"></div><span class="lbl">3</span><span class="px">12</span></div>
  <div class="col"><div class="box" style="width:16px;height:16px"></div><span class="lbl">4</span><span class="px">16</span></div>
  <div class="col"><div class="box" style="width:24px;height:24px"></div><span class="lbl">6</span><span class="px">24</span></div>
  <div class="col"><div class="box" style="width:32px;height:32px"></div><span class="lbl">8</span><span class="px">32</span></div>
  <div class="col"><div class="box" style="width:48px;height:48px"></div><span class="lbl">12</span><span class="px">48</span></div>
  <div class="col"><div class="box" style="width:64px;height:64px"></div><span class="lbl">16</span><span class="px">64</span></div>
</div></body></html>
