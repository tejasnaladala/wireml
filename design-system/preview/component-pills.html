<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--wire-bg);color:var(--wire-text);font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{padding:24px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;border:1px solid;font-size:11px;letter-spacing:.04em;font-weight:500;font-family:var(--font-sans)}
.pill .dot{width:6px;height:6px;border-radius:999px}
.pwr{background:rgba(245,158,11,0.1);border-color:#f59e0b;color:#f59e0b}
.web{background:rgba(59,130,246,0.1);border-color:#3b82f6;color:#3b82f6}
.loc{background:rgba(239,68,68,0.1);border-color:#ef4444;color:#ef4444}
.tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;background:var(--wire-bg);border:1px solid var(--wire-border);color:var(--wire-muted);border-radius:999px}
</style></head><body><div class="card">
  <span class="pill pwr"><span class="dot" style="background:currentColor"></span>POWER MODE · CUDA</span>
  <span class="pill web"><span class="dot" style="background:currentColor"></span>WEB MODE · WEBGPU</span>
  <span class="pill loc"><span class="dot" style="background:currentColor"></span>LOCAL ONLY</span>
  <span class="tag">beginner</span>
  <span class="tag">advanced</span>
  <span class="tag">image</span>
</div></body></html>
