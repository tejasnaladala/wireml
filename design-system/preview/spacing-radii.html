<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--wire-bg);color:var(--wire-text);font-family:var(--font-sans)}
.card{padding:24px;display:grid;grid-template-columns:repeat(5,1fr);gap:18px}
.col{display:flex;flex-direction:column;align-items:center;gap:8px}
.box{width:56px;height:56px;background:var(--wire-surface);border:1px solid var(--wire-border)}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--wire-muted);text-transform:uppercase;letter-spacing:.1em}
.px{font-family:var(--font-mono);font-size:11px;color:var(--wire-text)}
</style></head><body><div class="card">
  <div class="col"><div class="box" style="border-radius:4px"></div><span class="lbl">xs</span><span class="px">4px</span></div>
  <div class="col"><div class="box" style="border-radius:6px"></div><span class="lbl">sm · inputs</span><span class="px">6px</span></div>
  <div class="col"><div class="box" style="border-radius:10px"></div><span class="lbl">md · menus</span><span class="px">10px</span></div>
  <div class="col"><div class="box" style="border-radius:16px"></div><span class="lbl">lg · cards</span><span class="px">16px</span></div>
  <div class="col"><div class="box" style="border-radius:999px"></div><span class="lbl">pill</span><span class="px">999</span></div>
</div></body></html>
