<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--wire-bg);color:var(--wire-text);font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;box-sizing:border-box}
.box{width:360px;display:flex;flex-direction:column;gap:10px}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--wire-muted)}
.inp,.sel{width:100%;padding:8px 10px;font-size:14px;background:var(--wire-surface-2);border:1px solid var(--wire-border);border-radius:6px;color:var(--wire-text);font-family:var(--font-sans);outline:none;box-sizing:border-box}
.inp:focus{border-color:var(--wire-accent)}
.search{position:relative}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--wire-muted)}
.search .inp{padding-left:32px}
</style></head><body><div class="box">
  <span class="lbl">Search</span>
  <div class="search"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><input class="inp" placeholder="Search nodes..." value="clip"></div>
  <span class="lbl">Learning rate</span>
  <input class="inp" type="number" value="0.001">
  <span class="lbl">Metric</span>
  <select class="sel"><option>cosine</option><option>euclidean</option></select>
</div></body></html>
