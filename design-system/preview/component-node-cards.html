<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--wire-bg);color:var(--wire-text);font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;box-sizing:border-box}
.row{display:flex;gap:18px;align-items:stretch}
.node{min-width:200px;background:var(--wire-surface);border-radius:12px;overflow:hidden;box-shadow:0 4px 24px -4px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);border:1px solid}
.head{padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--wire-border)}
.body{padding:10px 12px}
.name{font-size:14px;font-weight:600}
.desc{font-size:11px;color:var(--wire-muted);margin-top:2px}
.foot{padding:6px 12px;border-top:1px solid var(--wire-border);background:rgba(26,34,45,0.4);font-family:var(--font-mono);font-size:10px;color:var(--wire-muted);text-transform:uppercase;letter-spacing:.08em;display:flex;justify-content:space-between}
.cat{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--wire-muted);font-weight:600}
.dot{width:10px;height:10px;border-radius:2px}
.data{border-color:#10b981;background:rgba(16,185,129,0.08)}
.backbone{border-color:#3b82f6;background:rgba(59,130,246,0.08)}
.head-cat{border-color:#f59e0b;background:rgba(245,158,11,0.08)}
</style></head><body><div class="row">
  <div class="node data"><div class="head"><span class="dot" style="background:#10b981"></span><span class="cat" style="color:#10b981">data</span></div><div class="body"><div class="name">Webcam</div><div class="desc">Live camera feed. Captures frames on demand.</div></div><div class="foot"><span>◉ reactive</span></div></div>
  <div class="node backbone"><div class="head"><span class="dot" style="background:#3b82f6"></span><span class="cat" style="color:#3b82f6">backbone</span></div><div class="body"><div class="name">CLIP ViT-B/32</div><div class="desc">OpenAI CLIP image encoder. 512-d features.</div></div><div class="foot"><span>◉ reactive</span><span style="color:#f59e0b">335 MB</span></div></div>
  <div class="node head-cat"><div class="head"><span class="dot" style="background:#f59e0b"></span><span class="cat" style="color:#f59e0b">head</span></div><div class="body"><div class="name">Linear Classifier</div><div class="desc">Trainable linear head. Soft-max over classes.</div></div><div class="foot"><span>▶ triggered</span></div></div>
</div></body></html>
