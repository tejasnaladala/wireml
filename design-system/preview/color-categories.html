<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#050508;color:#e5ecf4;font-family:var(--font-sans)}
.card{padding:20px;display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.s{display:flex;flex-direction:column;gap:6px}
.sw{height:72px;border-radius:4px;border:1px solid #2a3240}
.n{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#6c7a8c}
.v{font-family:var(--font-mono);font-size:11px;color:#e5ecf4}
</style></head><body><div class="card">
  <div class="s"><div class="sw" style="background:#1a1d22"></div><span class="n">data</span><span class="v">#1a1d22</span></div>
  <div class="s"><div class="sw" style="background:#2a2f37"></div><span class="n">preprocess</span><span class="v">#2a2f37</span></div>
  <div class="s"><div class="sw" style="background:#3d434d"></div><span class="n">backbone</span><span class="v">#3d434d</span></div>
  <div class="s"><div class="sw" style="background:#5a6270"></div><span class="n">head</span><span class="v">#5a6270</span></div>
  <div class="s"><div class="sw" style="background:#8a94a3"></div><span class="n">eval</span><span class="v">#8a94a3</span></div>
  <div class="s"><div class="sw" style="background:#c9d1dc"></div><span class="n">deploy</span><span class="v">#c9d1dc</span></div>
</div></body></html>
