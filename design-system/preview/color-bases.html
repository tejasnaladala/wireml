<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:var(--wire-bg);color:var(--wire-text);font-family:var(--font-sans)}
.card{padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.s{display:flex;flex-direction:column;gap:6px}
.sw{height:72px;border-radius:10px;border:1px solid var(--wire-border)}
.n{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--wire-muted)}
.v{font-family:var(--font-mono);font-size:12px;color:var(--wire-text)}
</style></head><body><div class="card">
  <div class="s"><div class="sw" style="background:var(--wire-bg)"></div><span class="n">bg</span><span class="v">#0a0e14</span></div>
  <div class="s"><div class="sw" style="background:var(--wire-surface)"></div><span class="n">surface</span><span class="v">#131921</span></div>
  <div class="s"><div class="sw" style="background:var(--wire-surface-2)"></div><span class="n">surface-2</span><span class="v">#1a222d</span></div>
  <div class="s"><div class="sw" style="background:var(--wire-border)"></div><span class="n">border</span><span class="v">#2a3240</span></div>
</div></body></html>
