<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#050508;color:#e5ecf4;font-family:var(--font-mono);
  display:flex;align-items:center;justify-content:center;min-height:100vh}
.stack{display:flex;flex-direction:column;gap:4px;padding:28px 36px;min-width:520px}
.row{display:flex;align-items:baseline;gap:14px;padding:8px 0;
  border-bottom:1px dashed #1a1d22;font-size:14px;letter-spacing:.02em}
.row:last-child{border-bottom:none}
.idx{color:#3d434d;width:44px;font-size:11px;letter-spacing:.16em}
.name{flex:1}
.hex{color:#6c7a8c;font-size:11px;letter-spacing:.1em;text-transform:uppercase}
</style></head><body>
<div class="stack">
  <div class="row"><span class="idx">CH.01</span><span class="name" style="color:#e5ecf4">Awakening</span><span class="hex">#e5ecf4</span></div>
  <div class="row"><span class="idx">CH.02</span><span class="name" style="color:#c9d1dc">Indictment</span><span class="hex">#c9d1dc</span></div>
  <div class="row"><span class="idx">CH.03</span><span class="name" style="color:#8a94a3">The Graph</span><span class="hex">#8a94a3</span></div>
  <div class="row"><span class="idx">CH.04</span><span class="name" style="color:#6c7a8c">The Arsenal</span><span class="hex">#6c7a8c</span></div>
  <div class="row"><span class="idx">CH.05</span><span class="name" style="color:#5a6270">The Fork</span><span class="hex">#5a6270</span></div>
  <div class="row"><span class="idx">CH.06</span><span class="name" style="color:#3d434d">Universe</span><span class="hex">#3d434d</span></div>
  <div class="row"><span class="idx">CH.07</span><span class="name" style="color:#2a2f37">Resolution</span><span class="hex">#2a2f37</span></div>
</div>
</body></html>
