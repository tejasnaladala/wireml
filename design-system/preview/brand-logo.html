<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#050508;color:var(--wire-text);font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
.stage{position:relative;display:flex;flex-direction:column;align-items:center;gap:18px;padding:28px 48px}
/* CRT scanlines */
.stage::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(transparent 0 2px,rgba(255,255,255,0.025) 2px 3px);
  mix-blend-mode:overlay}
/* subtle vignette */
.stage::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.6) 100%)}

.mark{position:relative;display:flex;align-items:center;gap:10px;padding:4px 0}
.mark svg{display:block}
/* single phosphor glow stroke — CRT green on dark */
.stroke{stroke:#9effc8;fill:none;stroke-width:1.5;stroke-linecap:square;stroke-linejoin:miter;
  filter:drop-shadow(0 0 2px rgba(158,255,200,0.6)) drop-shadow(0 0 6px rgba(158,255,200,0.25))}
.node-fill{fill:#9effc8;filter:drop-shadow(0 0 3px rgba(158,255,200,0.7))}

.wordmark{font-family:var(--font-mono);font-size:22px;font-weight:500;
  color:#e5ecf4;letter-spacing:.02em;
  text-shadow:0 0 6px rgba(229,236,244,0.12)}
.wordmark .slash{color:#6c7a8c}
/* blinking terminal caret */
.caret{display:inline-block;width:9px;height:18px;background:#9effc8;margin-left:4px;
  vertical-align:-3px;animation:blink 1.05s steps(1,end) infinite;
  box-shadow:0 0 6px rgba(158,255,200,0.7)}
@keyframes blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}

.tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.28em;
  text-transform:uppercase;color:#6c7a8c;position:relative}
.tag::before{content:"~ ";color:#9effc8;opacity:.7}
</style></head>
<body>
<div class="stage">
  <div class="mark">
    <svg width="34" height="24" viewBox="0 0 34 24">
      <!-- 3-node wire: two inputs on the left, one on the right -->
      <path class="stroke" d="M6 6 H14 M14 6 V12 M14 12 H22 M14 18 H22 M6 18 H14 M14 18 V12"/>
      <rect class="node-fill" x="4" y="4" width="4" height="4"/>
      <rect class="node-fill" x="4" y="16" width="4" height="4"/>
      <rect class="node-fill" x="24" y="10" width="4" height="4"/>
    </svg>
    <span class="wordmark">wire<span class="slash">/</span>ml<span class="caret"></span></span>
  </div>
  <span class="tag">NODE GRAPH ML WORKBENCH</span>
</div>
</body></html>
