<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#050508;color:#e5ecf4;font-family:var(--font-sans)}
.card{padding:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.s{display:flex;flex-direction:column;gap:6px}
.sw{height:72px;border-radius:4px;border:1px solid #2a3240}
.n{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#6c7a8c}
.v{font-family:var(--font-mono);font-size:11px;color:#e5ecf4}
.v .t{color:#6c7a8c}
</style></head><body><div class="card">
  <div class="s"><div class="sw" style="background:#020203"></div><span class="n">void</span><span class="v">#020203 <span class="t">· true black</span></span></div>
  <div class="s"><div class="sw" style="background:#050508"></div><span class="n">bg-cinema</span><span class="v">#050508 <span class="t">· site bg</span></span></div>
  <div class="s"><div class="sw" style="background:#0a0e14"></div><span class="n">bg</span><span class="v">#0a0e14 <span class="t">· app bg</span></span></div>
  <div class="s"><div class="sw" style="background:#131921"></div><span class="n">surface</span><span class="v">#131921 <span class="t">· panel</span></span></div>
  <div class="s"><div class="sw" style="background:#2a3240"></div><span class="n">border</span><span class="v">#2a3240 <span class="t">· hairline</span></span></div>
  <div class="s"><div class="sw" style="background:#6c7a8c"></div><span class="n">muted</span><span class="v">#6c7a8c <span class="t">· 2ndary</span></span></div>
  <div class="s"><div class="sw" style="background:#e5ecf4"></div><span class="n">text</span><span class="v">#e5ecf4 <span class="t">· phosphor</span></span></div>
  <div class="s"><div class="sw" style="background:#9effc8"></div><span class="n">crt accent</span><span class="v">#9effc8 <span class="t">· sparing</span></span></div>
  <div class="s"><div class="sw" style="background:#ffffff"></div><span class="n">pure white</span><span class="v">#ffffff <span class="t">· ::selection</span></span></div>
</div></body></html>
