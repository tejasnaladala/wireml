<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#050508;color:#e5ecf4;font-family:var(--font-mono);display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;overflow:hidden}
body::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(transparent 0 2px,rgba(255,255,255,0.025) 2px 3px);mix-blend-mode:overlay}
.card{padding:24px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:10px;padding:8px 14px;
  font-family:var(--font-mono);font-size:13px;letter-spacing:.06em;
  background:transparent;color:#e5ecf4;border:1px solid #2a3240;
  border-radius:2px;cursor:pointer;text-transform:uppercase;
  transition:all 120ms}
.btn:hover{border-color:#9effc8;color:#9effc8;box-shadow:0 0 0 1px #9effc8 inset,0 0 8px rgba(158,255,200,0.15)}
.primary{border-color:#9effc8;color:#9effc8;
  box-shadow:0 0 0 1px #9effc8 inset,0 0 10px rgba(158,255,200,0.2);
  text-shadow:0 0 6px rgba(158,255,200,0.5)}
.primary:hover{background:rgba(158,255,200,0.08)}
.disabled{color:#3d434d;border-color:#2a2f37;cursor:not-allowed}
.disabled:hover{color:#3d434d;border-color:#2a2f37;box-shadow:none}
.prompt{color:#6c7a8c}
.caret{display:inline-block;width:7px;height:12px;background:#9effc8;
  vertical-align:-1px;margin-left:6px;box-shadow:0 0 6px rgba(158,255,200,0.7);
  animation:blink 1.05s steps(1,end) infinite}
@keyframes blink{0%,50%{opacity:1}50.01%,100%{opacity:0}}
.icon{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:square}
</style></head><body><div class="card">
  <button class="btn primary"><span class="prompt">&gt;</span>run_graph<span class="caret"></span></button>
  <button class="btn"><span class="prompt">$</span>open_demo</button>
  <button class="btn"><span class="prompt">$</span>gh_star
    <svg class="icon" viewBox="0 0 24 24"><polygon points="12 3 15 9 22 9 16.5 13.5 18.5 21 12 17 5.5 21 7.5 13.5 2 9 9 9"/></svg>
  </button>
  <button class="btn disabled" disabled><span class="prompt">…</span>running</button>
</div></body></html>
