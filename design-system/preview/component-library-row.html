<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#050508;color:#e5ecf4;font-family:var(--font-mono);padding:24px;position:relative;overflow:hidden}
body::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(transparent 0 2px,rgba(255,255,255,0.025) 2px 3px);mix-blend-mode:overlay}
.cat{display:flex;flex-direction:column;gap:2px;max-width:340px}
.head{display:flex;align-items:baseline;gap:10px;padding:8px 4px;
  border-bottom:1px dashed #1a1d22;margin-bottom:4px}
.lbl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#8a94a3;font-weight:500}
.cnt{margin-left:auto;font-size:10px;color:#3d434d}
.row{display:flex;align-items:baseline;gap:10px;padding:5px 4px;
  font-size:13px;letter-spacing:.02em;cursor:pointer;color:#6c7a8c;
  transition:color 120ms}
.row:hover{color:#9effc8;text-shadow:0 0 6px rgba(158,255,200,0.4)}
.pfx{color:#3d434d;font-size:11px;width:18px;flex-shrink:0}
.row:hover .pfx{color:#9effc8}
.name{flex:1}
.kind{color:#3d434d;font-size:10px;letter-spacing:.08em;text-transform:uppercase}
.row:hover .kind{color:#6c7a8c}
</style></head><body>
<div class="cat">
  <div class="head"><span class="lbl">data_sources</span><span class="cnt">[3]</span></div>
  <div class="row"><span class="pfx">&gt;</span><span class="name">webcam</span><span class="kind">reactive</span></div>
  <div class="row"><span class="pfx">&gt;</span><span class="name">upload_images</span><span class="kind">triggered</span></div>
  <div class="row"><span class="pfx">&gt;</span><span class="name">microphone</span><span class="kind">reactive</span></div>
</div>
</body></html>
