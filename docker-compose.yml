services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - runtime
    restart: unless-stopped

  runtime:
    build:
      context: ./apps/runtime
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    volumes:
      - wireml-models:/root/.cache/huggingface
    restart: unless-stopped
    # GPU passthrough — uncomment one block depending on host.
    #
    # NVIDIA:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    #
    # AMD ROCm:
    # devices:
    #   - /dev/kfd
    #   - /dev/dri
    # group_add:
    #   - video

volumes:
  wireml-models:
    driver: local
